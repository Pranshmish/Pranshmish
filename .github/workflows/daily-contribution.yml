name: Daily Green Contribution

on:
  schedule:
    - cron: "30 0 * * *" # Runs daily at 12:30 AM UTC (6:00 AM IST)
  workflow_dispatch:      # Allows manual triggering

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Timestamp
        run: |
          mkdir -p generated
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > generated/last_updated.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/last_updated.txt
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: daily contribution update $(date -u '+%Y-%m-%d')" && git push)
